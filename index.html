<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BabiBrowse</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card-hover:#334155;
    --text:#ffffff;
    --muted:#94a3b8;
    --accent:#eab308;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI",sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper{
    width:100%;
    max-width:900px;
    padding:30px;
    text-align:center;
}

.logo{
    width:140px;
    height:140px;
    object-fit:contain;
    margin-bottom:20px;
}

h1{
    font-size:48px;
    font-weight:600;
    margin-bottom:8px;
}

.clock{
    color:var(--muted);
    font-size:18px;
    margin-bottom:40px;
}

.search-container{
    max-width:700px;
    margin:auto;
}

.search-box{
    display:flex;
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    border:1px solid #334155;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    padding:20px;
    font-size:20px;
}

.search-box button{
    border:none;
    background:var(--accent);
    color:#111;
    padding:0 30px;
    cursor:pointer;
    font-weight:700;
    font-size:16px;
}

.search-box button:hover{
    opacity:.9;
}

.favorites-title{
    margin-top:50px;
    color:var(--muted);
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
}

.favorites{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

.favorite{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    text-decoration:none;
    color:white;
    transition:.2s;
}

.favorite:hover{
    background:var(--card-hover);
    transform:translateY(-2px);
}

.icon{
    font-size:30px;
    margin-bottom:10px;
}

.name{
    font-size:15px;
}

.footer{
    margin-top:40px;
    color:#64748b;
    font-size:12px;
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- Your BabiBrowse Bird -->
    <img src="logo.png" class="logo" alt="BabiBrowse">

    <h1>BabiBrowse</h1>

    <div class="clock" id="clock"></div>

    <div class="search-container">
        <form id="searchForm">
            <div class="search-box">
                <input
                    id="searchInput"
                    type="text"
                    placeholder="Search the web..."
                    autocomplete="off"
                    autofocus>
                <button type="submit">Search</button>
            </div>
        </form>
    </div>

    <div class="favorites-title">
        Most Visited
    </div>

    <div class="favorites">

        <a class="favorite" href="https://chatgpt.com">
            <div class="icon">🤖</div>
            <div class="name">ChatGPT</div>
        </a>

        <a class="favorite" href="https://github.com">
            <div class="icon">💻</div>
            <div class="name">GitHub</div>
        </a>

        <a class="favorite" href="https://youtube.com">
            <div class="icon">▶️</div>
            <div class="name">YouTube</div>
        </a>

      

        <a class="favorite" href="https://aidatplan.com">
            <div class="icon">🏢</div>
            <div class="name">AidatPlan</div>
        </a>

        <a class="favorite" href="https://planion.de">
            <div class="icon">📋</div>
            <div class="name">Planion</div>
        </a>

    </div>

    <div class="footer">
        BabiBrowse • Fast • Private • Simple
    </div>

</div>

<script>
function updateClock(){
    const now = new Date();

    document.getElementById('clock').innerHTML =
        now.toLocaleDateString(undefined,{
            weekday:'long',
            day:'numeric',
            month:'long',
            year:'numeric'
        })
        + " • " +
        now.toLocaleTimeString([],{
            hour:'2-digit',
            minute:'2-digit'
        });
}

updateClock();
setInterval(updateClock,1000);

document.getElementById('searchForm').addEventListener('submit',function(e){

    e.preventDefault();

    const q =
        document.getElementById('searchInput')
        .value
        .trim();

    if(!q) return;

    // Change this later to your own search endpoint
    window.location.href =
        "https://www.google.com/search?q=" +
        encodeURIComponent(q);
});
</script>

</body>
</html>
